<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Música</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c14;
    --card: #0f1520;
    --card2: #161f30;
    --accent: #00d4ff;
    --accent2: #7b5ea7;
    --green: #1db954;
    --text: #e8f0fe;
    --muted: #5a6a85;
    --border: #1e2d45;
    --glow: rgba(0,212,255,0.2);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* BG GRADIENT */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse 80% 50% at 20% 0%, rgba(0,212,255,0.06) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(123,94,167,0.07) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: relative; z-index: 10;
    padding: 20px 28px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.4rem;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }
  .header-hint { font-size: .75rem; color: var(--muted); }

  /* ── LAYOUT ── */
  .app {
    position: relative; z-index: 1;
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 0;
    flex: 1;
    min-height: 0;
  }

  /* ── SONG LIST ── */
  .song-list-wrap {
    overflow-y: auto;
    padding: 20px 0 120px;
  }
  .list-header {
    padding: 0 24px 14px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .list-title {
    font-family: 'Syne', sans-serif;
    font-size: .7rem;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .total-badge {
    font-size: .7rem;
    color: var(--accent);
    background: rgba(0,212,255,0.1);
    padding: 3px 10px;
    border-radius: 99px;
    border: 1px solid rgba(0,212,255,0.2);
  }

  /* SONG ITEM */
  .song-item {
    display: grid;
    grid-template-columns: 52px 1fr auto;
    align-items: center;
    gap: 0;
    padding: 10px 24px 10px 16px;
    cursor: pointer;
    transition: background .18s;
    border-left: 3px solid transparent;
    position: relative;
  }
  .song-item:hover { background: rgba(255,255,255,0.03); }
  .song-item.active {
    background: rgba(0,212,255,0.05);
    border-left-color: var(--accent);
  }

  .song-num {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    font-size: .8rem;
    color: var(--muted);
    font-weight: 500;
    flex-shrink: 0;
  }
  .song-item.active .song-num { color: var(--accent); }
  .song-item.playing .song-num { display: flex; gap: 2px; align-items: flex-end; }
  
  /* animated bars */
  .mini-bars { display: none; gap: 2px; align-items: flex-end; height: 16px; }
  .song-item.playing .mini-bars { display: flex; }
  .song-item.playing .num-txt { display: none; }
  .mb { width: 3px; border-radius: 1px; background: var(--accent); animation: mb .7s ease-in-out infinite; }
  .mb:nth-child(2) { animation-delay:.2s; }
  .mb:nth-child(3) { animation-delay:.1s; }
  @keyframes mb { 0%,100%{height:3px} 50%{height:14px} }

  .song-info { padding: 0 12px; overflow: hidden; }
  .song-name {
    font-size: .9rem;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .song-item.active .song-name { color: var(--accent); }
  .song-sub {
    font-size: .72rem;
    color: var(--muted);
    margin-top: 2px;
  }
  .song-dur {
    font-size: .78rem;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }

  /* ── NOW PLAYING PANEL ── */
  .np-panel {
    background: var(--card);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 24px 28px;
    gap: 18px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  .art-wrap {
    width: 200px; height: 200px;
    border-radius: 20px;
    background: linear-gradient(135deg, var(--card2), #1a2540);
    display: flex; align-items: center; justify-content: center;
    font-size: 5rem;
    position: relative;
    box-shadow: 0 24px 60px rgba(0,0,0,0.6), 0 0 0 1px var(--border);
    overflow: hidden;
    flex-shrink: 0;
  }
  .art-wrap::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 30% 30%, rgba(0,212,255,0.12), transparent 60%);
  }
  .art-emoji { position: relative; z-index: 1; transition: transform .3s; }
  .art-wrap.pulse .art-emoji { animation: artPulse 2s ease-in-out infinite; }
  @keyframes artPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }

  .np-name {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    text-align: center;
    max-width: 240px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    line-height: 1.3;
  }
  .np-track-num { font-size: .75rem; color: var(--muted); }

  /* PROGRESS */
  .prog-wrap { width: 100%; }
  .time-row { display: flex; justify-content: space-between; font-size: .72rem; color: var(--muted); margin-bottom: 8px; }
  
  input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 3px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  input[type=range].filled {
    background: linear-gradient(to right, var(--accent) var(--v,0%), var(--border) var(--v,0%));
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 13px; height: 13px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 8px var(--glow);
    transition: transform .15s;
  }
  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.4); }

  /* CONTROLS */
  .controls {
    display: flex; align-items: center; justify-content: center;
    gap: 16px;
  }
  .cbtn {
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-size: 1.15rem;
    padding: 8px;
    border-radius: 50%;
    transition: color .2s, background .2s, transform .15s;
    line-height: 1;
  }
  .cbtn:hover { color: var(--text); background: rgba(255,255,255,0.06); transform: scale(1.1); }
  .cbtn.on { color: var(--accent); }

  .playbtn {
    width: 54px; height: 54px;
    border-radius: 50%;
    background: var(--accent);
    border: none; cursor: pointer;
    font-size: 1.3rem;
    color: #000;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 24px rgba(0,212,255,0.4);
    transition: transform .15s, box-shadow .2s;
    font-weight: bold;
  }
  .playbtn:hover { transform: scale(1.07); box-shadow: 0 0 36px rgba(0,212,255,0.6); }
  .playbtn:active { transform: scale(.95); }

  /* VOLUME */
  .vol-row { display: flex; align-items: center; gap: 10px; width: 100%; }
  .vol-icon { font-size: .95rem; cursor: pointer; color: var(--muted); transition: color .2s; }
  .vol-icon:hover { color: var(--text); }

  /* MODE LABEL */
  .mode-lbl { font-size: .68rem; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; min-height: 14px; text-align: center; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    .app { grid-template-columns: 1fr; }
    .np-panel {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: auto; flex-direction: row;
      padding: 12px 16px;
      gap: 12px;
      border-left: none;
      border-top: 1px solid var(--border);
      backdrop-filter: blur(20px);
      background: rgba(15,21,32,0.95);
      z-index: 100;
      overflow: visible;
    }
    .art-wrap { width: 48px; height: 48px; font-size: 1.5rem; border-radius: 8px; flex-shrink: 0; }
    .np-name { font-size: .85rem; text-align: left; }
    .np-track-num { display: none; }
    .prog-wrap, .vol-row, .mode-lbl { display: none; }
    .controls { gap: 8px; }
    .cbtn { font-size: .95rem; padding: 6px; }
    .playbtn { width: 40px; height: 40px; font-size: 1rem; }
    .song-list-wrap { padding-bottom: 90px; }
    .np-info { flex: 1; overflow: hidden; display: flex; flex-direction: column; gap: 4px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">MI <span>MÚSICA</span></div>
  <div class="header-hint">21 canciones • Carpeta local</div>
</header>

<div class="app">

  <!-- LISTA -->
  <div class="song-list-wrap">
    <div class="list-header">
      <div class="list-title">Lista de reproducción</div>
      <div class="total-badge">21 canciones</div>
    </div>
    <div id="songList"></div>
  </div>

  <!-- NOW PLAYING -->
  <div class="np-panel" id="npPanel">
    <div class="art-wrap" id="artWrap">
      <div class="art-emoji" id="artEmoji">🎵</div>
    </div>
    <div class="np-info" style="width:100%;display:flex;flex-direction:column;align-items:center;gap:4px;">
      <div class="np-name" id="npName">Selecciona una canción</div>
      <div class="np-track-num" id="npNum">—</div>
    </div>

    <div class="prog-wrap">
      <div class="time-row">
        <span id="curT">0:00</span>
        <span id="durT">0:00</span>
      </div>
      <input type="range" class="filled" id="seekBar" min="0" max="100" value="0" style="--v:0%">
    </div>

    <div class="controls">
      <button class="cbtn" id="btnShuffle" title="Aleatorio">🔀</button>
      <button class="cbtn" id="btnPrev">⏮</button>
      <button class="playbtn" id="btnPlay">▶</button>
      <button class="cbtn" id="btnNext">⏭</button>
      <button class="cbtn" id="btnRepeat">🔁</button>
    </div>

    <div class="mode-lbl" id="modeLbl"></div>

    <div class="vol-row">
      <span class="vol-icon" id="volIcon">🔊</span>
      <input type="range" class="filled" id="volBar" min="0" max="100" value="85" style="--v:85%">
    </div>
  </div>

</div>

<audio id="audio"></audio>

<script>
// ════════════════════════════════════════════════
//  ✏️  AQUÍ ESTÁN TUS 21 CANCIONES
//  Solo cambia el "file" por el nombre de tu archivo
//  y el "name" por como quieres que aparezca en pantalla
//  Todos los archivos deben estar en la MISMA carpeta que este HTML
// ════════════════════════════════════════════════
const SONGS = [
  { name: "Oye Mujer", file: "002 RayMix   Oye Mujer [Video Oficial].mp3", emoji: "🎵" },
  { name: "Despues de Ti", file: "006 DESPUES DE TI, QUIEN_.mp3", emoji: "🎸" },
  { name: "Hombre Libre", file: "007 HOMBRE LIBRE.mp3", emoji: "🔥" },
  { name: "La Risa", file: "008 LA RISA DE TU CARA.mp3", emoji: "🎶" },
  { name: "Mis Sentimientos", file: "008 Mis Sentimientos (feat. Ximena Sa.mp3", emoji: "⚡" },
  { name: "Disfrute engañarte", file: "009 DISFRUTE ENGAÑARTE.mp3", emoji: "🎹" },
  { name: "El general", file: "12.-  EL GENERAL - gerardo ortiz.mp3", emoji: "🎤" },
  { name: "Gano Holanda", file: "14.- GANO HOLANDA, PERDIO CHINA - calibre 50.mp3", emoji: "💿" },
  { name: "Aguanta Corazon", file: "25 aguanta corazon - los invasores de nuevo leon.mp3", emoji: "🎺" },
  { name: "Hermosa Experiencia", file: "026 HERMOSA EXPERIENCIA.mp3", emoji: "🎻" },
  { name: "No hay Novedad", file: "26 no hay novedad - cadetes.mp3", emoji: "🥁" },
  { name: "Se quedaron a 3 pasos", file: "30.- SE QUEDARON A TRES PASOS - calibre 50.mp3", emoji: "🎷" },
  { name: "Mi Razon de Ser", file: "031 MI RAZON DE SER.mp3", emoji: "🌊" },
  { name: "Mi ultimo Deseo", file: "31.- MI ULTIMO DESEO - banda recoditos.mp3", emoji: "🌙" },
  { name: "Pongamonos de Acuerdo", file: "063 PONGAMONOS DE ACUERDO.mp3", emoji: "☀️" },
  { name: "Te hubieras ido antes", file: "075 TE HUBIERAS IDO ANTES.mp3", emoji: "🎯" },
  { name: "Tatuajes", file: "090 TATUAJES.mp3", emoji: "🚀" },
  { name: "El Karma", file: "114 EL KARMA.mp3", emoji: "💫" },
  { name: "El toro Encartado", file: "118 EL TORO ENCARTADO.mp3", emoji: "🎭" },
  { name: "La Vida Ruina", file: "121 LA VIDA RUINA feat. Marca Regist.mp3", emoji: "🌈" },
  { name: "Vas a Llorar por mi", file: "186 VAS A LLORAR POR MI.mp3", emoji: "❤️" },
];
// ════════════════════════════════════════════════

const audio    = document.getElementById('audio');
const songList = document.getElementById('songList');
const btnPlay  = document.getElementById('btnPlay');
const btnPrev  = document.getElementById('btnPrev');
const btnNext  = document.getElementById('btnNext');
const btnShuffle = document.getElementById('btnShuffle');
const btnRepeat  = document.getElementById('btnRepeat');
const seekBar  = document.getElementById('seekBar');
const volBar   = document.getElementById('volBar');
const volIcon  = document.getElementById('volIcon');
const curT     = document.getElementById('curT');
const durT     = document.getElementById('durT');
const npName   = document.getElementById('npName');
const npNum    = document.getElementById('npNum');
const artEmoji = document.getElementById('artEmoji');
const artWrap  = document.getElementById('artWrap');
const modeLbl  = document.getElementById('modeLbl');

let current  = -1;
let playing  = false;
let shuffle  = false;
let repeat   = 0; // 0=off 1=all 2=one
const durs   = new Array(SONGS.length).fill(0);

// ── RENDER LIST ─────────────────────────────────
function render() {
  songList.innerHTML = '';
  SONGS.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'song-item' + (i===current?' active':'') + (i===current&&playing?' playing':'');
    div.innerHTML = `
      <div class="song-num">
        <span class="num-txt">${i+1}</span>
        <div class="mini-bars"><div class="mb"></div><div class="mb"></div><div class="mb"></div></div>
      </div>
      <div class="song-info">
        <div class="song-name">${s.name}</div>
        <div class="song-sub">${s.emoji} Pista ${i+1}</div>
      </div>
      <div class="song-dur">${durs[i] ? fmt(durs[i]) : '—'}</div>
    `;
    div.addEventListener('click', () => load(i, true));
    songList.appendChild(div);
  });
}

// ── LOAD SONG ────────────────────────────────────
function load(i, autoplay=false) {
  current = i;
  const s = SONGS[i];
  audio.src = s.file;
  audio.volume = volBar.value / 100;
  npName.textContent = s.name;
  npNum.textContent  = `Pista ${i+1} de ${SONGS.length}`;
  artEmoji.textContent = s.emoji;
  artWrap.classList.add('pulse');
  if (autoplay) {
    audio.play().then(()=>{ playing=true; btnPlay.textContent='⏸'; render(); }).catch(()=>{ render(); });
  } else {
    render();
  }
}

// ── PLAY/PAUSE ───────────────────────────────────
btnPlay.addEventListener('click', () => {
  if (current === -1) { load(0, true); return; }
  if (playing) { audio.pause(); playing=false; btnPlay.textContent='▶'; artWrap.classList.remove('pulse'); }
  else         { audio.play();  playing=true;  btnPlay.textContent='⏸'; artWrap.classList.add('pulse'); }
  render();
});

// ── NEXT / PREV ──────────────────────────────────
function nextSong() {
  if (repeat===2) { audio.currentTime=0; audio.play(); return; }
  let idx = shuffle ? rnd() : (current+1) % SONGS.length;
  if (idx===0 && !shuffle && repeat===0) { audio.pause(); playing=false; btnPlay.textContent='▶'; artWrap.classList.remove('pulse'); render(); return; }
  load(idx, true);
}
function prevSong() {
  if (audio.currentTime > 3) { audio.currentTime=0; return; }
  let idx = shuffle ? rnd() : (current-1+SONGS.length) % SONGS.length;
  load(idx, true);
}
btnNext.addEventListener('click', nextSong);
btnPrev.addEventListener('click', prevSong);
audio.addEventListener('ended', nextSong);

function rnd() { let n; do { n=Math.floor(Math.random()*SONGS.length); } while(n===current&&SONGS.length>1); return n; }

// ── SHUFFLE / REPEAT ─────────────────────────────
btnShuffle.addEventListener('click', () => {
  shuffle = !shuffle;
  btnShuffle.classList.toggle('on', shuffle);
  updateMode();
});
btnRepeat.addEventListener('click', () => {
  repeat = (repeat+1)%3;
  btnRepeat.textContent = repeat===2 ? '🔂' : '🔁';
  btnRepeat.classList.toggle('on', repeat>0);
  updateMode();
});
function updateMode() {
  if (repeat===2) modeLbl.textContent = 'Repetir canción';
  else if (repeat===1) modeLbl.textContent = 'Repetir lista';
  else if (shuffle) modeLbl.textContent = 'Modo aleatorio';
  else modeLbl.textContent = '';
}

// ── SEEK ─────────────────────────────────────────
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const p = audio.currentTime / audio.duration * 100;
  seekBar.value = p;
  seekBar.style.setProperty('--v', p+'%');
  curT.textContent = fmt(audio.currentTime);
});
audio.addEventListener('loadedmetadata', () => {
  durT.textContent = fmt(audio.duration);
  if (current>=0) { durs[current]=audio.duration; render(); }
});
seekBar.addEventListener('input', () => {
  if (audio.duration) audio.currentTime = seekBar.value/100 * audio.duration;
  seekBar.style.setProperty('--v', seekBar.value+'%');
});

// ── VOLUME ───────────────────────────────────────
volBar.addEventListener('input', () => {
  audio.volume = volBar.value/100;
  volBar.style.setProperty('--v', volBar.value+'%');
  volIcon.textContent = volBar.value==0 ? '🔇' : volBar.value<50 ? '🔉' : '🔊';
});
volIcon.addEventListener('click', () => {
  audio.muted = !audio.muted;
  volIcon.textContent = audio.muted ? '🔇' : '🔊';
});

// ── KEYBOARD ─────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName==='INPUT') return;
  if (e.code==='Space')      { e.preventDefault(); btnPlay.click(); }
  if (e.code==='ArrowRight') audio.currentTime = Math.min(audio.duration||0, audio.currentTime+5);
  if (e.code==='ArrowLeft')  audio.currentTime = Math.max(0, audio.currentTime-5);
  if (e.code==='ArrowUp')    { volBar.value=Math.min(100,+volBar.value+5); volBar.dispatchEvent(new Event('input')); }
  if (e.code==='ArrowDown')  { volBar.value=Math.max(0,+volBar.value-5);  volBar.dispatchEvent(new Event('input')); }
});

// ── UTILS ────────────────────────────────────────
function fmt(s) {
  if (!s||isNaN(s)) return '0:00';
  return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
}

// ── INIT ─────────────────────────────────────────
render();
</script>
</body>
</html>
